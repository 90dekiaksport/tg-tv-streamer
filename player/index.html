<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Telegram TV Streamer</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      background-color: #121212;
      color: #eceff1;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at top, rgba(63, 81, 181, 0.2), transparent 35%),
        linear-gradient(180deg, #111827 0%, #090b10 100%);
    }

    header {
      padding: 22px 18px 16px;
      display: grid;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.45);
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.65;
      max-width: 740px;
    }

    .controls {
      display: grid;
      gap: 12px;
      padding: 0 18px 18px;
    }

    .select-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.94rem;
      color: #94a3b8;
    }

    select {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(15, 23, 42, 0.92);
      color: #f8fafc;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
      transition: border-color 200ms ease;
    }

    select:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
    }

    .player-frame {
      position: relative;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 18px 18px;
    }

    .video-card {
      width: 100%;
      max-width: 1080px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.94), rgba(10, 14, 24, 0.99));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.08);
    }

    video {
      width: 100%;
      min-height: 58vh;
      background: #000;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
    }

    .meta strong {
      color: #f8fafc;
      font-size: 1rem;
    }

    .meta small {
      color: #94a3b8;
    }

    .status {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(96, 165, 250, 0.12);
      color: #bfdbfe;
      font-size: 0.88rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    @media (max-width: 720px) {
      .video-card {
        border-radius: 20px;
      }

      .meta {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <h1>Telegram TV Streamer</h1>
        <p>Open in Telegram Web Apps to watch free public live channels with a native HLS player.</p>
      </div>
    </div>
  </header>

  <section class="controls">
    <div class="select-wrapper">
      <label for="channel-select">Choose a live channel</label>
      <select id="channel-select" aria-label="Channel selection"></select>
    </div>
  </section>

  <main class="player-frame">
    <div class="video-card">
      <video id="video" playsinline controls></video>
      <div class="meta">
        <div>
          <strong id="channel-title">Loading channel...</strong>
          <div><small id="channel-description">Select a channel to start streaming.</small></div>
        </div>
        <div class="status" id="stream-status">Ready</div>
      </div>
    </div>
  </main>

  <script>
    const telegram = window.Telegram.WebApp;
    telegram.ready();
    telegram.expand();

    const configUrl = "https://YOUR_GITHUB_USERNAME.github.io/telegram-tv/player/streams.json";

    const defaultChannels = [
      {
        id: "sample-news",
        title: "Live News Sample",
        description: "Public sample HLS stream for testing.",
        src: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8"
      },
      {
        id: "demo-channel-2",
        title: "Demo Channel",
        description: "Sample broadcast stream from a stable public source.",
        src: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
      },
      {
        id: "demo-channel-3",
        title: "Public Stream Demo",
        description: "Free public HLS stream for browser playback.",
        src: "https://wowzaec2demo.streamlock.net/live/bigbuckbunny/playlist.m3u8"
      }
    ];

    let channels = [...defaultChannels];
    const selectEl = document.getElementById("channel-select");
    const titleEl = document.getElementById("channel-title");
    const descEl = document.getElementById("channel-description");
    const statusEl = document.getElementById("stream-status");
    const video = document.getElementById("video");
    let hls;

    function createOption(channel) {
      const option = document.createElement("option");
      option.value = channel.id;
      option.textContent = channel.title;
      return option;
    }

    function updateStatus(text) {
      statusEl.textContent = text;
    }

    function setChannel(channel) {
      titleEl.textContent = channel.title;
      descEl.textContent = channel.description;
      loadStream(channel.src);
    }

    function loadStream(src) {
      updateStatus("Loading stream...");
      if (hls) {
        hls.destroy();
        hls = null;
      }

      if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {
            updateStatus("Tap play to continue");
          });
          updateStatus("Live stream ready");
        });
        hls.on(Hls.Events.ERROR, (_event, data) => {
          if (data.fatal) {
            updateStatus(`Stream error: ${data.type}`);
          }
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = src;
        video.addEventListener("loadedmetadata", () => {
          video.play().catch(() => {
            updateStatus("Tap play to continue");
          });
          updateStatus("Live stream ready");
        });
      } else {
        updateStatus("HLS not supported in this browser.");
      }
    }

    function renderChannels(list) {
      selectEl.innerHTML = "";
      list.forEach(channel => selectEl.append(createOption(channel)));
      selectEl.disabled = list.length === 0;
    }

    function selectChannelById(id) {
      const channel = channels.find(channel => channel.id === id) || channels[0];
      if (channel) {
        setChannel(channel);
      }
    }

    async function loadRemoteConfig() {
      try {
        updateStatus("Loading channel list...");
        const response = await fetch(configUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const remoteChannels = await response.json();
        if (Array.isArray(remoteChannels) && remoteChannels.length > 0) {
          channels = remoteChannels;
          renderChannels(channels);
          selectEl.value = channels[0].id;
          selectChannelById(channels[0].id);
          updateStatus("Channel list updated from remote config.");
          return;
        }
        throw new Error("Remote config returned invalid channel data.");
      } catch (error) {
        console.warn("Remote config failed:", error);
        if (channels.length > 0) {
          renderChannels(channels);
          selectEl.value = channels[0].id;
          selectChannelById(channels[0].id);
          updateStatus("Using local fallback channels.");
        } else {
          updateStatus("No channels available.");
        }
      }
    }

    selectEl.addEventListener("change", () => {
      const selected = channels.find(channel => channel.id === selectEl.value);
      if (selected) {
        setChannel(selected);
      }
    });

    renderChannels(channels);
    if (channels.length > 0) {
      selectEl.value = channels[0].id;
      selectChannelById(channels[0].id);
    }

    loadRemoteConfig();
  </script>
</body>
</html>
