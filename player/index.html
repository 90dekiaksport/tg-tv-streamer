<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Telegram TV Streamer</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg-dark: #0d0e12;
      --card-bg: #161820;
      --accent: #007aff; /* Apple-style Electric Blue */
      --accent-glow: rgba(0, 122, 255, 0.4);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      padding: 24px 20px 10px;
    }

    h1 {
      margin: 0 0 4px 0;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      opacity: 0.9;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(239, 68, 68, 0.15);
      color: #ff4d4d;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      background: #ff4d4d;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 77, 77, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
    }

    .player-container {
      padding: 0 20px;
      margin-bottom: 24px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
    }

    #iframe-player {
      width: 100%;
      height: 100%;
      border: none;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 14, 18, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .content-info {
      padding: 16px 20px;
    }

    #channel-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
      display: block;
    }

    #channel-description {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .channel-section {
      margin-top: auto;
      padding-bottom: 40px;
    }

    .section-label {
      padding: 0 20px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 12px;
      display: block;
    }

    .channel-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 0 20px 40px;
    }

    .channel-card {
      width: 100%;
      aspect-ratio: 16 / 8;
      background: var(--card-bg);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .card-top { padding: 12px; display: flex; }
    .card-middle {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .team-logo { width: 55px; height: 35px; object-fit: contain; }
    .vs-divider { font-weight: 800; font-size: 1.1rem; opacity: 0.5; font-style: italic; }

    .card-bottom {
      padding: 12px 16px;
      background: rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
    }
    .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
    .card-desc { font-size: 0.75rem; color: var(--text-secondary); }

    .channel-card.active {
      border-color: #ff4d4d;
      box-shadow: 0 8px 24px rgba(255, 77, 77, 0.15);
    }

    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 20px;
      font-size: 0.75rem;
      background: rgba(13, 14, 18, 0.9);
      backdrop-filter: blur(10px);
      color: var(--text-secondary);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <header>
    <div class="live-badge">
      <div class="pulse-dot"></div>
      LIVE NOW
    </div>
    <h1>CinemaStream</h1>
  </header>

  <main>
    <div class="player-container">
      <div class="video-wrapper">
        <div class="loading-overlay" id="loading-overlay">
          <div class="spinner"></div>
        </div>
        <video id="video" playsinline controls></video>
        <iframe id="iframe-player" style="display: none;" sandbox="allow-forms allow-scripts allow-same-origin" allowfullscreen></iframe>
      </div>
    </div>

    <div class="content-info">
      <span id="channel-title">Loading...</span>
      <p id="channel-description">Initializing the premium streaming experience...</p>
    </div>

    <section class="channel-section">
      <span class="section-label">Browse Channels</span>
      <div class="channel-list" id="channel-list">
        <!-- Cards injected via JS -->
      </div>
    </section>
  </main>

  <div class="status-bar">
    <span id="stream-status">Connecting...</span>
  </div>

  <script>
    const telegram = window.Telegram.WebApp;
    telegram.ready();
    telegram.expand();

    // Point to the local streams.json served by your Express server
    const configUrl = "/player/streams.json";

    const defaultChannels = [
      {
        id: "sample-news",
        title: "Live News Sample",
        description: "Public sample HLS stream for testing.",
        src: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8"
      },
      {
        id: "demo-channel-2",
        title: "Demo Channel",
        description: "Sample broadcast stream from a stable public source.",
        src: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
      },
      {
        id: "demo-channel-3",
        title: "Public Stream Demo",
        description: "Free public HLS stream for browser playback.",
        src: "https://wowzaec2demo.streamlock.net/live/bigbuckbunny/playlist.m3u8"
      }
    ];

    let channels = [...defaultChannels];
    const listEl = document.getElementById("channel-list");
    const titleEl = document.getElementById("channel-title");
    const descEl = document.getElementById("channel-description");
    const statusEl = document.getElementById("stream-status");
    const loadingOverlay = document.getElementById("loading-overlay");
    const video = document.getElementById("video");
    const iframe = document.getElementById("iframe-player");
    let hls;

    /**
     * 🛡️ AGGRESSIVE AD & REDIRECT BLOCKING
     */
    // Prevent new window creation
    window.open = function() { return null; };
    
    // Prevent the parent window from being redirected
    window.onbeforeunload = function() {
      return "Blocked attempt to open external site.";
    };

    // If the iframe tries to steal focus for an ad, snatch it back
    window.addEventListener('blur', () => {
      if (document.activeElement === iframe) {
        setTimeout(() => window.focus(), 100);
      }
    });

    // Robust UI Fix: Hide loading overlay whenever video actually starts playing or fails
    video.addEventListener('playing', () => loadingOverlay.classList.remove("active"));
    video.addEventListener('pause', () => loadingOverlay.classList.remove("active"));
    video.addEventListener('error', () => {
      loadingOverlay.classList.remove("active");
      updateStatus("Error: Stream unavailable");
    });

    function updateStatus(text) {
      statusEl.textContent = text;
    }

    function setChannel(channel) {
      titleEl.textContent = channel.title;
      descEl.textContent = channel.description;
      loadStream(channel.src);
      updateActiveCard(channel.id);
    }

    function loadStream(src) {
      loadingOverlay.classList.add("active");
      updateStatus("Buffering...");

      // Determine if it's an HLS stream or an iframe/web source
      const isHls = src.includes(".m3u8") || src.includes("playlist");

      if (hls) {
        hls.destroy();
        hls = null;
      }

      if (isHls) {
        // HLS MODE: Use <video> tag
        iframe.style.display = "none";
        iframe.src = "about:blank"; 
        video.style.display = "block";

        if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          loadingOverlay.classList.remove("active");
          video.play().catch(() => {
            updateStatus("Tap play to continue");
          });
          updateStatus("Live stream ready");
        });
        hls.on(Hls.Events.ERROR, (_event, data) => {
          if (data.fatal) {
            loadingOverlay.classList.remove("active");
            updateStatus(`Stream error: ${data.type}`);
          }
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = src;
        video.addEventListener("loadedmetadata", () => {
          loadingOverlay.classList.remove("active");
          video.play().catch(() => {
            updateStatus("Tap play to continue");
          });
          updateStatus("Live stream ready");
        });
      } else {
        updateStatus("HLS not supported in this browser.");
      }
      } else {
        // IFRAME MODE: Use <iframe> tag for web players (like Koora)
        video.pause();
        video.removeAttribute('src');
        video.load();
        video.style.display = "none";
        
        iframe.style.display = "block";
        iframe.src = src;
        
        iframe.onload = () => {
          loadingOverlay.classList.remove("active");
          updateStatus("Web player loaded");
        };
      }
    }

    function renderChannels(list) {
      listEl.innerHTML = "";
      list.forEach(channel => {
        const card = document.createElement("div");
        card.className = "channel-card";
        card.dataset.id = channel.id;
        card.innerHTML = `
          <div class="card-top">
            <div class="live-badge"><div class="pulse-dot"></div> LIVE</div>
          </div>
          <div class="card-middle">
            <img src="${channel.logoLeft}" class="team-logo">
            <div class="vs-divider">VS</div>
            <img src="${channel.logoRight}" class="team-logo">
          </div>
          <div class="card-bottom">
            <span class="card-title">${channel.title}</span>
            <span class="card-desc">${channel.description}</span>
          </div>
        `;
        card.onclick = () => setChannel(channel);
        listEl.appendChild(card);
      });
    }

    function updateActiveCard(id) {
      document.querySelectorAll(".channel-card").forEach(card => {
        card.classList.toggle("active", card.dataset.id === id);
      });
    }

    async function loadRemoteConfig() {
      try {
        updateStatus("Syncing catalog...");
        const response = await fetch(configUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const remoteChannels = await response.json();
        if (Array.isArray(remoteChannels) && remoteChannels.length > 0) {
          channels = remoteChannels;
          renderChannels(channels);
          setChannel(channels[0]);
          updateStatus("Live Connection");
          return;
        }
        throw new Error("Remote config returned invalid channel data.");
      } catch (error) {
        console.warn("Remote config failed:", error);
        if (channels.length > 0) {
          renderChannels(channels);
          setChannel(channels[0]);
          updateStatus("Offline mode active");
        } else {
          updateStatus("No channels available.");
        }
      }
    }

    renderChannels(channels);
    if (channels.length > 0) {
      setChannel(channels[0]);
    }

    loadRemoteConfig();
  </script>
</body>
</html>
