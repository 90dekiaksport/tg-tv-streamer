<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Telegram TV Streamer</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg-dark: #0d0e12;
      --card-bg: #161820;
      --accent: #007aff; /* Apple-style Electric Blue */
      --accent-glow: rgba(0, 122, 255, 0.4);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      padding: 24px 20px 10px;
    }

    h1 {
      margin: 0 0 4px 0;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      opacity: 0.9;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(239, 68, 68, 0.15);
      color: #ff4d4d;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      background: #ff4d4d;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 77, 77, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
    }

    .player-container {
      padding: 0 20px;
      margin-bottom: 24px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 14, 18, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .content-info {
      padding: 16px 20px;
    }

    #channel-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
      display: block;
    }

    #channel-description {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .channel-section {
      margin-top: auto;
      padding-bottom: 40px;
    }

    .section-label {
      padding: 0 20px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 12px;
      display: block;
    }

    .channel-list {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 0 20px 10px;
      scrollbar-width: none;
    }

    .channel-list::-webkit-scrollbar {
      display: none;
    }

    .channel-card {
      flex: 0 0 140px;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 80px;
    }

    .channel-card.active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 8px 20px var(--accent-glow);
    }

    .channel-card .card-title {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 20px;
      font-size: 0.75rem;
      background: rgba(13, 14, 18, 0.9);
      backdrop-filter: blur(10px);
      color: var(--text-secondary);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <header>
    <div class="live-badge">
      <div class="pulse-dot"></div>
      LIVE NOW
    </div>
    <h1>CinemaStream</h1>
  </header>

  <main>
    <div class="player-container">
      <div class="video-wrapper">
        <div class="loading-overlay" id="loading-overlay">
          <div class="spinner"></div>
        </div>
        <video id="video" playsinline controls></video>
      </div>
    </div>

    <div class="content-info">
      <span id="channel-title">Loading...</span>
      <p id="channel-description">Initializing the premium streaming experience...</p>
    </div>

    <section class="channel-section">
      <span class="section-label">Browse Channels</span>
      <div class="channel-list" id="channel-list">
        <!-- Cards injected via JS -->
      </div>
    </section>
  </main>

  <div class="status-bar">
    <span id="stream-status">Connecting...</span>
  </div>

  <script>
    const telegram = window.Telegram.WebApp;
    telegram.ready();
    telegram.expand();

    const configUrl = "https://YOUR_GITHUB_USERNAME.github.io/telegram-tv/player/streams.json";

    const defaultChannels = [
      {
        id: "sample-news",
        title: "Live News Sample",
        description: "Public sample HLS stream for testing.",
        src: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8"
      },
      {
        id: "demo-channel-2",
        title: "Demo Channel",
        description: "Sample broadcast stream from a stable public source.",
        src: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
      },
      {
        id: "demo-channel-3",
        title: "Public Stream Demo",
        description: "Free public HLS stream for browser playback.",
        src: "https://wowzaec2demo.streamlock.net/live/bigbuckbunny/playlist.m3u8"
      }
    ];

    let channels = [...defaultChannels];
    const listEl = document.getElementById("channel-list");
    const titleEl = document.getElementById("channel-title");
    const descEl = document.getElementById("channel-description");
    const statusEl = document.getElementById("stream-status");
    const loadingOverlay = document.getElementById("loading-overlay");
    const video = document.getElementById("video");
    let hls;

    function updateStatus(text) {
      statusEl.textContent = text;
    }

    function setChannel(channel) {
      titleEl.textContent = channel.title;
      descEl.textContent = channel.description;
      loadStream(channel.src);
      updateActiveCard(channel.id);
    }

    function loadStream(src) {
      loadingOverlay.classList.add("active");
      updateStatus("Buffering...");

      if (hls) {
        hls.destroy();
        hls = null;
      }

      if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {
            updateStatus("Tap play to continue");
          });
          updateStatus("Live stream ready");
        });
        hls.on(Hls.Events.ERROR, (_event, data) => {
          if (data.fatal) {
            updateStatus(`Stream error: ${data.type}`);
          }
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = src;
        video.addEventListener("loadedmetadata", () => {
          video.play().catch(() => {
            updateStatus("Tap play to continue");
          });
          updateStatus("Live stream ready");
        });
      } else {
        updateStatus("HLS not supported in this browser.");
      }
    }

    function renderChannels(list) {
      selectEl.innerHTML = "";
      list.forEach(channel => selectEl.append(createOption(channel)));
      selectEl.disabled = list.length === 0;
    }

    function selectChannelById(id) {
      const channel = channels.find(channel => channel.id === id) || channels[0];
      if (channel) {
        setChannel(channel);
      }
    }

    async function loadRemoteConfig() {
      try {
        updateStatus("Loading channel list...");
        const response = await fetch(configUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const remoteChannels = await response.json();
        if (Array.isArray(remoteChannels) && remoteChannels.length > 0) {
          channels = remoteChannels;
          renderChannels(channels);
          selectEl.value = channels[0].id;
          selectChannelById(channels[0].id);
          updateStatus("Channel list updated from remote config.");
          return;
        }
        throw new Error("Remote config returned invalid channel data.");
      } catch (error) {
        console.warn("Remote config failed:", error);
        if (channels.length > 0) {
          renderChannels(channels);
          selectEl.value = channels[0].id;
          selectChannelById(channels[0].id);
          updateStatus("Using local fallback channels.");
        } else {
          updateStatus("No channels available.");
        }
      }
    }

    selectEl.addEventListener("change", () => {
      const selected = channels.find(channel => channel.id === selectEl.value);
      if (selected) {
        setChannel(selected);
      }
    });

    renderChannels(channels);
    if (channels.length > 0) {
      selectEl.value = channels[0].id;
      selectChannelById(channels[0].id);
    }

    loadRemoteConfig();
  </script>
</body>
</html>
